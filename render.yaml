services:
  # Backend — FastAPI (free web service)
  - type: web
    name: legacybridge-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: PYTHON_VERSION
        value: "3.11.0"

  # Frontend — React static site (free)
  - type: web
    name: legacybridge-ui
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /api/*
        destination: https://legacybridge-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
